<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="utf-8">
<title>OrderHub - Acces Securizat</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,Segoe UI,Roboto,sans-serif;background:#f5f5f5;color:#333}
.gate{position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,#1a3a52 0%,#2c5f8d 100%);
       display:flex;align-items:center;justify-content:center;z-index:9999}
.gate-box{background:white;padding:40px;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,0.3);
          max-width:380px;width:90%;text-align:center}
.gate-logo{font-size:50px;margin-bottom:8px}
.gate-title{color:#1a3a52;margin-bottom:8px;font-size:22px}
.gate-sub{color:#666;margin-bottom:24px;font-size:13px}
.gate-input{width:100%;padding:14px;border:2px solid #ddd;border-radius:8px;font-size:16px;
            margin-bottom:14px;text-align:center;letter-spacing:2px}
.gate-input:focus{border-color:#4a90e2;outline:none}
.gate-btn{width:100%;padding:14px;background:#4a90e2;color:white;border:none;border-radius:8px;
          font-size:16px;font-weight:600;cursor:pointer;letter-spacing:0.5px}
.gate-btn:hover{background:#3a80d2}
.gate-err{color:#e74c3c;font-size:13px;margin-top:10px;min-height:18px}
.gate-loading{color:#666;font-size:12px;margin-top:10px}
#content{display:none}
</style>
</head>
<body>
<div class="gate" id="gate">
  <div class="gate-box">
    <div class="gate-logo">🔒</div>
    <h1 class="gate-title">OrderHub Dashboard</h1>
    <p class="gate-sub">Introdu parola pentru a accesa raportul</p>
    <input class="gate-input" type="password" id="pwd" placeholder="parola" autofocus autocomplete="off">
    <button class="gate-btn" id="enter" onclick="tryDecrypt()">Deschide raport</button>
    <div class="gate-err" id="err"></div>
    <div class="gate-loading" id="loading"></div>
  </div>
</div>
<div id="content"></div>

function b64toUint8(b64) {
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return arr;
}

async function deriveKey(password, salt, iterations) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey(
    "raw", enc.encode(password),
    { name: "PBKDF2" }, false, ["deriveKey"]
  );
  return await crypto.subtle.deriveKey(
    { name: "PBKDF2", salt: salt, iterations: iterations, hash: "SHA-256" },
    keyMaterial,
    { name: "AES-GCM", length: 256 },
    false, ["decrypt"]
  );
}

async function tryDecrypt() {
  const pwd = document.getElementById('pwd').value;
  const errEl = document.getElementById('err');
  const loadEl = document.getElementById('loading');
  errEl.textContent = '';
  loadEl.textContent = 'Decriptez...';
  try {
    const salt = b64toUint8(ENCRYPTED.salt);
    const nonce = b64toUint8(ENCRYPTED.nonce);
    const ct = b64toUint8(ENCRYPTED.ct);
    const key = await deriveKey(pwd, salt, ENCRYPTED.iterations);
    const pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv: nonce }, key, ct);
    const html = new TextDecoder().decode(pt);
    // Salveaza hash parola in sessionStorage pt re-decriptare la refresh (optional)
    sessionStorage.setItem('orderhub_pwd', pwd);
    showContent(html);
  } catch (e) {
    errEl.textContent = 'Parola gresita';
    loadEl.textContent = '';
  }
}

function showContent(html) {
  // Inlocuieste pagina cu continutul decriptat
  document.open();
  document.write(html);
  document.close();
}

// Auto-decrypt daca exista parola salvata in sesiune
window.addEventListener('DOMContentLoaded', async () => {
  const saved = sessionStorage.getItem('orderhub_pwd');
  if (saved) {
    document.getElementById('pwd').value = saved;
    await tryDecrypt();
  }
});

// Enter key pe input -> submit
document.getElementById('pwd').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') tryDecrypt();
});
</script>
